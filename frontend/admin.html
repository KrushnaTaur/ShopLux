<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — ShopLux</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a class="navbar-brand" href="index.html">✦ ShopLux</a>
  <ul class="navbar-nav">
    <li><span id="nav-user" style="display:none; color:var(--text-muted); font-size:0.85rem; padding:0 0.5rem;"></span></li>
    <li><a class="nav-link" href="index.html"><span>Shop</span></a></li>
    <li><a class="nav-link active" href="admin.html" id="nav-admin" style="display:none;"><span>Admin</span></a></li>
    <li><button class="btn btn-ghost btn-sm" id="nav-logout" style="display:none;">Logout</button></li>
  </ul>
</nav>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="product-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title">Add Product</h3>
      <button class="modal-close" onclick="closeProductModal()">✕</button>
    </div>

    <div id="modal-alert" class="alert"></div>

    <input type="hidden" id="edit-product-id" />

    <div class="form-group">
      <label class="form-label">Product Name *</label>
      <input type="text" id="p-name" class="form-control" placeholder="e.g. Wireless Earbuds" />
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.8rem;">
      <div class="form-group">
        <label class="form-label">Price (₹) *</label>
        <input type="number" id="p-price" class="form-control" placeholder="999" min="0" />
      </div>
      <div class="form-group">
        <label class="form-label">Stock</label>
        <input type="number" id="p-stock" class="form-control" placeholder="100" min="0" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <input type="text" id="p-category" class="form-control" placeholder="Electronics" />
    </div>
    <div class="form-group">
      <label class="form-label">Image URL</label>
      <input type="url" id="p-image" class="form-control" placeholder="https://..." />
    </div>
    <div class="form-group">
      <label class="form-label">Description *</label>
      <textarea id="p-description" class="form-control" rows="3" placeholder="Brief description of the product…"></textarea>
    </div>

    <div style="display:flex; gap:0.8rem; justify-content:flex-end;">
      <button class="btn btn-ghost" onclick="closeProductModal()">Cancel</button>
      <button class="btn btn-primary" id="save-product-btn" onclick="saveProduct()">Save Product</button>
    </div>
  </div>
</div>

<!-- MAIN CONTENT -->
<main class="container page-content">

  <!-- Header -->
  <div class="page-header" style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:1rem;">
    <div>
      <h1>Admin Dashboard</h1>
      <p>Manage products, view orders</p>
    </div>
    <button class="btn btn-primary" onclick="openProductModal()">+ Add Product</button>
  </div>

  <!-- Stats -->
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card"><div class="stat-value" id="stat-products">—</div><div class="stat-label">Total Products</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-orders">—</div><div class="stat-label">Total Orders</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-revenue">—</div><div class="stat-label">Total Revenue</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-pending">—</div><div class="stat-label">Pending Orders</div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('products', this)">Products</button>
    <button class="tab-btn" onclick="switchTab('orders', this)">All Orders</button>
  </div>

  <!-- PRODUCTS TAB -->
  <div class="tab-panel active" id="tab-products">
    <div id="products-table-wrap">
      <div class="loading-center"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- ORDERS TAB -->
  <div class="tab-panel" id="tab-orders">
    <div id="orders-table-wrap">
      <div class="loading-center"><div class="spinner"></div></div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script src="js/api.js"></script>
<script>
  let products = [];
  let orders   = [];

  document.addEventListener('DOMContentLoaded', async () => {
    if (!requireAdmin()) return;
    updateNavbar();
    await Promise.all([loadProducts(), loadOrders()]);
  });

  // ===== LOAD DATA =====
  const loadProducts = async () => {
    try {
      products = await apiFetch('/products');
      renderProductsTable();
      document.getElementById('stat-products').textContent = products.length;
    } catch (err) {
      document.getElementById('products-table-wrap').innerHTML =
        `<p style="color:var(--danger); padding:1rem;">Error: ${err.message}</p>`;
    }
  };

  const loadOrders = async () => {
    try {
      orders = await apiFetch('/orders/admin/all');
      renderOrdersTable();

      document.getElementById('stat-orders').textContent  = orders.length;
      document.getElementById('stat-pending').textContent = orders.filter(o => o.status === 'pending').length;
      const revenue = orders.reduce((s, o) => s + o.totalAmount, 0);
      document.getElementById('stat-revenue').textContent = formatPrice(revenue);
    } catch (err) {
      document.getElementById('orders-table-wrap').innerHTML =
        `<p style="color:var(--danger); padding:1rem;">Error: ${err.message}</p>`;
    }
  };

  // ===== RENDER TABLES =====
  const renderProductsTable = () => {
    const wrap = document.getElementById('products-table-wrap');
    if (!products.length) {
      wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div><h3>No products yet</h3><p>Click "Add Product" to get started</p></div>`;
      return;
    }
    wrap.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Category</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${products.map(p => `
              <tr>
                <td>
                  <img src="${p.image || 'https://placehold.co/48x48/1a1a2e/c8a96e?text=?'}"
                       style="width:48px; height:48px; object-fit:cover; border-radius:6px; background:var(--bg-3);"
                       onerror="this.src='https://placehold.co/48x48/1a1a2e/c8a96e?text=?'" />
                </td>
                <td style="font-weight:500;">${p.name}</td>
                <td style="color:var(--accent); font-weight:600;">${formatPrice(p.price)}</td>
                <td>${p.stock ?? 'N/A'}</td>
                <td><span style="color:var(--text-muted);">${p.category || '—'}</span></td>
                <td>
                  <div style="display:flex; gap:0.5rem;">
                    <button class="btn btn-ghost btn-sm" onclick='openEditModal(${JSON.stringify(p)})'>Edit</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p._id}', '${p.name}')">Delete</button>
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>`;
  };

  const renderOrdersTable = () => {
    const wrap = document.getElementById('orders-table-wrap');
    if (!orders.length) {
      wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><h3>No orders yet</h3></div>`;
      return;
    }
    wrap.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Items</th>
              <th>Total</th>
              <th>Status</th>
              <th>Date</th>
              <th>Update Status</th>
            </tr>
          </thead>
          <tbody>
            ${orders.map(o => `
              <tr>
                <td style="font-family:monospace; font-size:0.8rem; color:var(--text-muted);">#${o._id.slice(-8).toUpperCase()}</td>
                <td>
                  <div style="font-weight:500;">${o.user?.name || 'Unknown'}</div>
                  <div style="font-size:0.8rem; color:var(--text-muted);">${o.user?.email || ''}</div>
                </td>
                <td>${o.items.length} item${o.items.length !== 1 ? 's' : ''}</td>
                <td style="color:var(--accent); font-weight:600;">${formatPrice(o.totalAmount)}</td>
                <td><span class="badge badge-${o.status}">${o.status}</span></td>
                <td style="color:var(--text-muted); font-size:0.85rem;">${formatDate(o.createdAt)}</td>
                <td>
                  <select class="form-control" style="padding:0.3rem 0.5rem; font-size:0.8rem; width:auto;"
                    onchange="updateOrderStatus('${o._id}', this.value)">
                    <option value="pending"    ${o.status==='pending'    ? 'selected' : ''}>Pending</option>
                    <option value="processing" ${o.status==='processing' ? 'selected' : ''}>Processing</option>
                    <option value="shipped"    ${o.status==='shipped'    ? 'selected' : ''}>Shipped</option>
                    <option value="delivered"  ${o.status==='delivered'  ? 'selected' : ''}>Delivered</option>
                    <option value="cancelled"  ${o.status==='cancelled'  ? 'selected' : ''}>Cancelled</option>
                  </select>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>`;
  };

  // ===== TABS =====
  const switchTab = (name, el) => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById(`tab-${name}`).classList.add('active');
  };

  // ===== PRODUCT MODAL =====
  const openProductModal = () => {
    document.getElementById('modal-title').textContent = 'Add Product';
    document.getElementById('edit-product-id').value   = '';
    document.getElementById('p-name').value        = '';
    document.getElementById('p-price').value       = '';
    document.getElementById('p-stock').value       = '';
    document.getElementById('p-category').value    = '';
    document.getElementById('p-image').value       = '';
    document.getElementById('p-description').value = '';
    document.getElementById('modal-alert').className = 'alert';
    document.getElementById('product-modal').classList.add('open');
  };

  const openEditModal = (product) => {
    document.getElementById('modal-title').textContent     = 'Edit Product';
    document.getElementById('edit-product-id').value       = product._id;
    document.getElementById('p-name').value        = product.name;
    document.getElementById('p-price').value       = product.price;
    document.getElementById('p-stock').value       = product.stock || '';
    document.getElementById('p-category').value    = product.category || '';
    document.getElementById('p-image').value       = product.image || '';
    document.getElementById('p-description').value = product.description;
    document.getElementById('modal-alert').className = 'alert';
    document.getElementById('product-modal').classList.add('open');
  };

  const closeProductModal = () => {
    document.getElementById('product-modal').classList.remove('open');
  };

  document.getElementById('product-modal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('product-modal')) closeProductModal();
  });

  const saveProduct = async () => {
    const id          = document.getElementById('edit-product-id').value;
    const name        = document.getElementById('p-name').value.trim();
    const price       = parseFloat(document.getElementById('p-price').value);
    const stock       = parseInt(document.getElementById('p-stock').value) || 100;
    const category    = document.getElementById('p-category').value.trim();
    const image       = document.getElementById('p-image').value.trim();
    const description = document.getElementById('p-description').value.trim();
    const alertEl     = document.getElementById('modal-alert');
    const btn         = document.getElementById('save-product-btn');

    if (!name || !price || !description) {
      alertEl.textContent = 'Name, price, and description are required';
      alertEl.className = 'alert alert-error show';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      const payload = { name, price, stock, category, image, description };
      if (id) {
        await apiFetch(`/products/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
        showToast('Product updated successfully');
      } else {
        await apiFetch('/products', { method: 'POST', body: JSON.stringify(payload) });
        showToast('Product added successfully');
      }
      closeProductModal();
      await loadProducts();
    } catch (err) {
      alertEl.textContent = err.message;
      alertEl.className = 'alert alert-error show';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Product';
    }
  };

  const deleteProduct = async (id, name) => {
    if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
    try {
      await apiFetch(`/products/${id}`, { method: 'DELETE' });
      showToast(`"${name}" deleted`);
      await loadProducts();
    } catch (err) {
      showToast(err.message, 'error');
    }
  };

  // ===== ORDER STATUS =====
  const updateOrderStatus = async (orderId, status) => {
    try {
      await apiFetch(`/orders/${orderId}/status`, {
        method: 'PUT',
        body: JSON.stringify({ status }),
      });
      showToast(`Order status updated to ${status}`);
      await loadOrders(); // Refresh stats
    } catch (err) {
      showToast(err.message, 'error');
    }
  };
</script>
</body>
</html>
