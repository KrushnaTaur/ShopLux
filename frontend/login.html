<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ShopLux</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-logo">
    <span>✦ ShopLux</span>
  </div>
  <h2 class="auth-title">Welcome Back</h2>
  <p class="auth-sub">Sign in to continue shopping</p>

  <div id="alert" class="alert"></div>

  <div class="form-group">
    <label class="form-label">Email</label>
    <input type="email" id="email" class="form-control" placeholder="you@example.com" />
  </div>

  <div class="form-group">
    <label class="form-label">Password</label>
    <input type="password" id="password" class="form-control" placeholder="••••••••" />
  </div>

  <button class="btn btn-primary btn-full btn-lg" id="login-btn" onclick="handleLogin()">
    Sign In
  </button>

  <div class="auth-footer">
    Don't have an account? <a href="signup.html">Create one →</a>
  </div>

  <!-- Demo credentials hint -->
  <div style="margin-top:1.5rem; padding:1rem; background:var(--bg-3); border-radius:var(--radius-sm); border:1px solid var(--border);">
    <p style="font-size:0.78rem; color:var(--text-muted); text-align:center; margin-bottom:0.5rem; text-transform:uppercase; letter-spacing:0.05em;">Demo Accounts</p>
    <p style="font-size:0.82rem; color:var(--text-muted); text-align:center;">Admin: <span style="color:var(--accent);">admin@shop.com</span> / admin123</p>
    <p style="font-size:0.82rem; color:var(--text-muted); text-align:center;">User: <span style="color:var(--accent);">user@shop.com</span> / user1234</p>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  // Redirect if already logged in
  document.addEventListener('DOMContentLoaded', () => redirectIfLoggedIn());

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  const showAlert = (msg, type = 'error') => {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert alert-${type} show`;
  };

  const handleLogin = async () => {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('login-btn');

    if (!email || !password) return showAlert('Please fill in all fields');

    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      const data = await apiFetch('/auth/login', {
        method: 'POST',
        body: JSON.stringify({ email, password }),
      });

      saveAuth(data.token, data.user);
      showAlert('Login successful! Redirecting…', 'success');
      setTimeout(() => window.location.href = 'index.html', 800);

    } catch (err) {
      showAlert(err.message);
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  };
</script>
</body>
</html>
